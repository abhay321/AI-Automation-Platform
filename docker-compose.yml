version: "3.8"

services:
  # --- CORE METADATA DATABASES & CACHING (PROFILE: infra) ---
  postgres:
    image: postgres:16-alpine
    container_name: platform-postgres
    profiles:
      - infra
      - all
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: platform_db
      POSTGRES_USER: platform_admin
      POSTGRES_PASSWORD: secret_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform_admin -d platform_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: platform-redis
    profiles:
      - infra
      - all
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- MESSAGE BROKER (PROFILE: messaging) ---
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: platform-rabbitmq
    profiles:
      - messaging
      - all
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: platform_user
      RABBITMQ_DEFAULT_PASS: mq_password
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- OBJECT STORAGE (PROFILE: storage) ---
  minio:
    image: minio/minio:RELEASE.2024-05-10T01-39-38Z
    container_name: platform-minio
    profiles:
      - storage
      - all
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- VECTOR STORE (PROFILE: vector) ---
  qdrant:
    image: qdrant/qdrant:v1.9.1
    container_name: platform-qdrant
    profiles:
      - vector
      - all
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- METRICS & OBSERVABILITY (PROFILE: monitoring) ---
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: platform-prometheus
    profiles:
      - monitoring
      - all
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:11.0.0
    container_name: platform-grafana
    profiles:
      - monitoring
      - all
    ports:
      - "4000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=grafana_secret
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  qdrant_data:
  prometheus_data:
  grafana_data:
